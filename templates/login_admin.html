<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Administrador - SimuladoPro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card card shadow-lg">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="fas fa-shield-alt fa-3x text-danger"></i>
        <h3 class="mt-2 fw-bold">Acesso Administrativo</h3>
        <p class="text-muted">Área restrita - Relatórios</p>
      </div>
      
      {% if erro %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>{{ erro }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}
      
      <form method="POST">
        <div class="mb-3">
          <label class="form-label"><i class="fas fa-user me-1"></i>Usuário</label>
          <input type="text" name="usuario" class="form-control" placeholder="Digite o usuário admin" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="fas fa-lock me-1"></i>Senha</label>
          <input type="password" name="senha" class="form-control" placeholder="Digite a senha admin" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">
          <i class="fas fa-sign-in-alt me-2"></i>Acessar Relatórios
        </button>
      </form>
      
      <hr>
      <p class="text-center mb-0">
        <a href="{{ url_for('login') }}" class="text-decoration-none">
          <i class="fas fa-arrow-left me-1"></i>Voltar ao login normal
        </a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
