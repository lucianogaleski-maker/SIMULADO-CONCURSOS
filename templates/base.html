<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Simulado Concursos{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
{% if session.usuario_id %}
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold"><i class="fas fa-graduation-cap me-2"></i>SimuladoPro</a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white"><i class="fas fa-user me-1"></i>{{ session.usuario_nome }}</span>
      <a href="{{ url_for('historico') }}" class="btn btn-outline-light btn-sm">Histórico</a>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Sair</a>
    </div>
  </div>
</nav>
{% endif %}
<div class="{% if not session.usuario_id %}auth-wrapper{% else %}container mt-4{% endif %}">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
